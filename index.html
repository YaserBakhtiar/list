<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <title>برنامه هفتگی</title>
    <link rel="manifest" href="data:application/manifest+json,{}" id="manifest-placeholder">
    <!-- Google Fonts: Vazirmatn + Amiri (fallback) -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-glow: rgba(99, 102, 241, 0.3);
            --secondary: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --bg-primary: #0a0c15;
            --bg-secondary: #111827;
            --bg-card: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            --radius: 1.25rem;
            --radius-sm: 0.875rem;
            --transition: all 0.2s ease;
        }
        [data-theme="light"] {
            --bg-primary: #f3f4f6;
            --bg-secondary: #ffffff;
            --bg-card: #f9fafb;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --border-color: rgba(0, 0, 0, 0.08);
        }
        body {
            font-family: 'Vazirmatn', 'Amiri', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 1.25rem;
            transition: var(--transition);
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
        }
        /* Header */
        .header {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 1.25rem 1.75rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .title h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .date-box {
            text-align: left;
            font-weight: 500;
        }
        .greg-date {
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary);
        }
        .action-buttons {
            display: flex;
            gap: 0.75rem;
        }
        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }
        /* Day Selector */
        .day-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-bottom: 2rem;
            justify-content: center;
        }
        .day-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 3rem;
            padding: 0.6rem 1.2rem;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
        }
        .day-btn:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .day-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-color: transparent;
            color: white;
            box-shadow: 0 6px 14px var(--primary-glow);
        }
        .day-btn.today {
            position: relative;
            border-color: var(--success);
        }
        .day-btn.today::after {
            content: '';
            position: absolute;
            top: -4px;
            right: -4px;
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--bg-secondary);
        }
        /* Tasks Panel */
        .tasks-panel {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .panel-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .panel-title h2 {
            font-size: 1.35rem;
            font-weight: 700;
        }
        .task-count {
            background: rgba(99,102,241,0.15);
            padding: 0.3rem 0.9rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary);
        }
        .filter-group {
            display: flex;
            gap: 0.5rem;
        }
        .filter-btn {
            background: var(--bg-card);
            border: none;
            padding: 0.45rem 1rem;
            border-radius: 2rem;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }
        .filter-btn.active {
            background: var(--primary);
            color: white;
        }
        /* Task List */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .task-item {
            background: var(--bg-card);
            border-radius: 1.25rem;
            padding: 1.2rem;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            position: relative;
        }
        .task-item.next-priority {
            border-right: 4px solid var(--warning);
            background: linear-gradient(115deg, rgba(245,158,11,0.08), var(--bg-card));
        }
        .task-item.completed {
            opacity: 0.7;
        }
        .task-item.completed .task-title {
            text-decoration: line-through;
        }
        /* Centered task info */
        .task-info-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .task-title {
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 0.2rem;
        }
        /* Time display larger */
        .time-display {
            background: var(--bg-secondary);
            border-radius: 2rem;
            padding: 0.5rem 1.2rem;
            display: inline-block;
            border: 1px solid var(--border-color);
        }
        .time-range {
            font-weight: 800;
            font-family: monospace;
            font-size: 1.2rem;
            color: var(--primary);
            letter-spacing: 0.5px;
        }
        .duration {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-right: 0.5rem;
        }
        .task-desc {
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            padding: 0.2rem 0.8rem;
            border-radius: 1rem;
            display: inline-block;
        }
        /* Bottom Check Button */
        .task-check-btn {
            width: 100%;
            margin-top: 0.5rem;
            display: flex;
            justify-content: center;
        }
        .check-button {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 3rem;
            padding: 0.7rem 1.2rem;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            width: 100%;
            justify-content: center;
        }
        .check-button i {
            font-size: 1.1rem;
        }
        .check-button:hover:not(.completed-btn) {
            background: var(--success);
            border-color: var(--success);
            color: white;
            transform: translateY(-2px);
        }
        .check-button.completed-btn {
            background: var(--success);
            border-color: var(--success);
            color: white;
            cursor: default;
            opacity: 0.7;
        }
        /* Stats Footer (only progress) */
        .stats-footer {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            padding: 1.25rem 1.5rem;
            margin-top: 1rem;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--bg-card);
            border-radius: 1rem;
            padding: 0.9rem 1rem;
            transition: var(--transition);
            max-width: 300px;
            margin: 0 auto;
        }
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
        }
        .stat-info {
            flex: 1;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            line-height: 1.2;
        }
        .stat-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .progress-bar-bg {
            height: 5px;
            background: var(--bg-secondary);
            border-radius: 10px;
            margin-top: 0.6rem;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        .notification {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 0.7rem 1.6rem;
            border-radius: 3rem;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            font-size: 0.85rem;
        }
        .notification.show {
            transform: translateX(-50%) translateY(0);
        }
        .empty-state {
            text-align: center;
            padding: 2.5rem;
            color: var(--text-secondary);
        }
        @media (max-width: 640px) {
            body { padding: 0.9rem; }
            .header { flex-direction: column; text-align: center; }
            .date-box { text-align: center; }
            .time-range { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">
            <h1>برنامه هفتگی</h1>
        </div>
        <div class="date-box">
            <div class="greg-date" id="gregDate"></div>
        </div>
        <div class="action-buttons">
            <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
            <button class="icon-btn" id="resetTodayBtn"><i class="fas fa-redo-alt"></i></button>
        </div>
    </div>

    <div class="day-selector" id="daySelector"></div>

    <div class="tasks-panel">
        <div class="panel-header">
            <div class="panel-title">
                <h2><i class="fas fa-list-check"></i> برنامه روز</h2>
                <span class="task-count" id="taskCount">۰ کار</span>
            </div>
            <div class="filter-group">
                <button class="filter-btn" data-filter="all">همه</button>
                <button class="filter-btn active" data-filter="pending">جاری</button>
                <button class="filter-btn" data-filter="completed">انجام‌شده</button>
            </div>
        </div>
        <div id="taskListContainer" class="task-list"></div>
    </div>

    <div class="stats-footer">
        <div class="stat-item">
            <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
            <div class="stat-info">
                <div class="stat-value" id="progressPercent">0%</div>
                <div class="stat-label">پیشرفت امروز</div>
                <div class="progress-bar-bg"><div class="progress-fill" id="percentFill"></div></div>
            </div>
        </div>
    </div>
</div>
<div id="notification" class="notification"><i class="fas fa-check-circle"></i><span></span></div>

<script>
    // ======================== SCHEDULE DATA ========================
    function makeTask(id, title, start, end, category, location, desc = '') {
        return { id, title, start, end, category, location, desc, duration: getDuration(start, end) };
    }
    function getDuration(start, end) {
        let [sh, sm] = start.split(':').map(Number);
        let [eh, em] = end.split(':').map(Number);
        let diff = (eh * 60 + em) - (sh * 60 + sm);
        let h = Math.floor(diff / 60), m = diff % 60;
        if (h > 0 && m > 0) return `${h}ساعت ${m}دقیقه`;
        if (h > 0) return `${h}ساعت`;
        return `${m}دقیقه`;
    }

    const scheduleDB = {};

    // شنبه (6)
    scheduleDB[6] = [
        makeTask(1, 'نماز صبح (جماعت)', '04:50', '05:40', 'عبادی', 'مسجد', 'بیداری و حضور'),
        makeTask(2, 'حفظ و مراجعه قرآن', '05:40', '06:30', 'عبادی', 'سحر', 'تمرکز بالا در سحر'),

        makeTask(7, 'درس قرائت در مسجد', '12:30', '13:30', 'عبادی', 'مسجد', 'بعد از نماز ظهر'),
        makeTask(8, 'واحد ۲ شریعت + تکرار دروس + استراحت', '14:00', '18:30', 'درسی', '-', ''),
        makeTask(9, 'کلاس عربی آنلاین', '18:30', '19:30', 'درسی', 'آنلاین', ''),

    scheduleDB[2] = [

        makeTask(7, 'ضبط محتوای کانال دوم', '10:30', '11:30', 'محتوا', 'یوتیوب', ''),

        makeTask(9, 'ناهار', '12:30', '13:15', 'شخصی', 'سلف', ''),

        makeTask(12, 'نماز عصر (جماعت)', '15:00', '15:30', 'عبادی', 'مسجد', ''),

        makeTask(14, 'نماز مغرب + تفریح', '17:20', '18:30', 'عبادی', 'خوابگاه', ''),
        makeTask(15, 'درس عربی آنلاین', '18:30', '19:30', 'درسی', 'آنلاین', ''),

    // چهارشنبه (3)
    scheduleDB[3] = [
        makeTask(1, 'نماز صبح', '04:30', '05:00', 'عبادی', 'مسجد', ''),
        makeTask(2, 'حفظ و مراجعه قرآن', '05:00', '06:30', 'عبادی', 'سحر', ''),
        makeTask(3, 'شریعت ۱ (عربی)', '06:30', '07:10', 'درسی', 'واحد', ''),
        makeTask(4, 'ورزش', '07:10', '07:50', 'شخصی', 'محوطه', ''),
        makeTask(5, 'صبحانه', '07:50', '08:20', 'شخصی', 'سلف', ''),
        makeTask(6, 'مطالعه آزاد', '08:10', '09:00', 'درسی', '-', ''),
        makeTask(7, 'حقوق انسان و احکام التزام', '09:00', '12:50', 'درسی', 'دانشگاه', ''),
        makeTask(8, 'نماز ظهر', '12:50', '13:30', 'عبادی', 'مسجد', ''),
        makeTask(9, 'ناهار', '13:30', '14:15', 'شخصی', 'سلف', ''),
        makeTask(10, 'شریعت ۲ (سیرت)', '14:15', '15:00', 'درسی', 'واحد', ''),
        makeTask(11, 'نماز عصر', '15:00', '15:30', 'عبادی', 'مسجد', ''),
        makeTask(12, 'محتوای اینستاگرام / فیسبوک', '15:30', '16:30', 'محتوا', '-', ''),
        makeTask(13, 'قانون اداری', '16:30', '18:30', 'درسی', 'دانشگاه', ''),
        makeTask(14, 'درس عربی آنلاین', '18:30', '19:30', 'درسی', 'آنلاین', ''),
        makeTask(15, 'جلسه قرائت مسجد', '19:30', '19:50', 'عبادی', 'مسجد', ''),
        makeTask(16, 'غذای شب', '19:50', '20:30', 'شخصی', 'سلف', ''),
        makeTask(17, 'شریعت ۳ (عقیده)', '20:30', '21:10', 'درسی', 'واحد', ''),
        makeTask(18, 'مسواک', '21:10', '21:20', 'شخصی', '-', ''),
        makeTask(19, 'استراحت', '21:30', '04:20', 'شخصی', '-', '')
    ];

    // پنجشنبه (4)
    scheduleDB[4] = [
        makeTask(1, 'ادیت و انتشار ویدیوها', '09:00', '11:00', 'محتوا', '-', 'یوتیوب/اینستاگرام'),
        makeTask(2, 'شریعت ۱ (تفسیر)', '11:00', '12:00', 'درسی', 'واحد', ''),
        makeTask(3, 'نماز ظهر و ناهار سریع', '12:00', '13:00', 'عبادی', 'مسجد/سلف', ''),
        makeTask(4, 'کلاس قانون تامین', '13:40', '17:20', 'درسی', 'دانشگاه', ''),
        makeTask(5, 'شریعت ۲ (تربیت اسلامی) و شریعت ۳ (فقه)', '18:00', '20:00', 'درسی', 'واحد', ''),
        makeTask(6, 'تفریح آزاد', '20:00', '23:00', 'شخصی', '-', '')
    ];

    // جمعه (5)
    scheduleDB[5] = [
        makeTask(1, 'نماز صبح + حفظ قرآن', '04:50', '06:00', 'عبادی', 'مسجد/سحر', 'سپس استراحت تا ۸:۳۰'),
        makeTask(2, 'ورزش سنگین‌تر یا تفریح خارج', '09:00', '10:30', 'شخصی', 'خارج', ''),
        makeTask(3, 'غسل جمعه و مطالعه آزاد', '10:30', '11:30', 'عبادی', '-', 'کتب غیر درسی'),
        makeTask(4, 'نماز جمعه و ناهار', '11:30', '13:30', 'عبادی', 'مسجد/سلف', ''),
        makeTask(5, 'استراحت و خواب ظهر', '14:00', '17:00', 'شخصی', '-', ''),
        makeTask(6, 'تفریح و ارتباطات', '17:00', '20:00', 'شخصی', '-', 'خانواده و دوستان'),
        makeTask(7, 'جمع‌بندی هفته و چیدمان هفته بعد', '20:00', '22:00', 'درسی', '-', 'برنامه‌ریزی')
    ];

    // ======================== STATE ========================
    let currentDay = new Date().getDay();
    let currentFilter = 'pending';
    let completedMap = JSON.parse(localStorage.getItem('smartProgress')) || {};

    function getDayKey(day) { return `day_${day}`; }
    function isCompleted(day, taskId) { return completedMap[getDayKey(day)]?.includes(taskId) || false; }
    function setCompleted(day, taskId, completed) {
        let key = getDayKey(day);
        if (!completedMap[key]) completedMap[key] = [];
        if (completed && !completedMap[key].includes(taskId)) completedMap[key].push(taskId);
        else if (!completed && completedMap[key].includes(taskId)) completedMap[key] = completedMap[key].filter(id => id !== taskId);
        localStorage.setItem('smartProgress', JSON.stringify(completedMap));
    }

    function getTasksForDay(day) {
        let tasks = scheduleDB[day] || [];
        return tasks.map(t => ({ ...t, completed: isCompleted(day, t.id) }));
    }

    function getNextPendingTask(tasks) {
        return tasks.find(t => !t.completed);
    }

    function renderTasks() {
        let tasks = getTasksForDay(currentDay);
        let filtered = tasks;
        if (currentFilter === 'completed') filtered = tasks.filter(t => t.completed);
        else if (currentFilter === 'pending') filtered = tasks.filter(t => !t.completed);

        let container = document.getElementById('taskListContainer');
        if (!filtered.length) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-calendar-week fa-2x"></i><h3 style="margin-top:0.8rem">هیچ کاری یافت نشد</h3></div>`;
            document.getElementById('taskCount').innerText = '۰ کار';
            return;
        }
        let nextId = getNextPendingTask(tasks)?.id;
        let html = '';
        filtered.forEach(task => {
            let isNext = (!task.completed && task.id === nextId);
            let completedClass = task.completed ? 'completed' : '';
            let priorityClass = isNext ? 'next-priority' : '';
            html += `
                <div class="task-item ${completedClass} ${priorityClass}" data-id="${task.id}">
                    <div class="task-info-grid">
                        <div class="task-title">${task.title}</div>
                        <div class="time-display">
                            <span class="time-range">${task.start} - ${task.end}</span>
                            <span class="duration">(${task.duration})</span>
                        </div>
                        ${task.desc ? `<div class="task-desc"><i class="fas fa-info-circle"></i> ${task.desc}</div>` : ''}
                    </div>
                    <div class="task-check-btn">
                        <button class="check-button ${task.completed ? 'completed-btn' : ''}" data-id="${task.id}">
                            <i class="fas ${task.completed ? 'fa-check-circle' : 'fa-circle'}"></i>
                            ${task.completed ? 'انجام شده' : 'انجام نشده'}
                        </button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        document.getElementById('taskCount').innerText = filtered.length + ' کار';
        document.querySelectorAll('.check-button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let taskId = parseInt(btn.dataset.id);
                let tasksNow = getTasksForDay(currentDay);
                let target = tasksNow.find(t => t.id === taskId);
                if (target && !target.completed) {
                    setCompleted(currentDay, taskId, true);
                    showNotif('✅ انجام شد!');
                    renderTasks();
                    updateStats();
                } else if (target && target.completed) {
                    showNotif('این کار قبلاً انجام شده است', 'info');
                }
            });
        });
    }

    function updateStats() {
        let tasks = getTasksForDay(currentDay);
        let total = tasks.length;
        let completed = tasks.filter(t => t.completed).length;
        let percent = total ? Math.round((completed / total) * 100) : 0;
        document.getElementById('progressPercent').innerText = percent + '%';
        document.getElementById('percentFill').style.width = percent + '%';
    }

    function updateDateHeader() {
        const now = new Date();
        const dayNames = ['یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنج‌شنبه', 'جمعه', 'شنبه'];
        const weekday = dayNames[now.getDay()];
        const months = ['ژانویه', 'فوریه', 'مارس', 'آپریل', 'مه', 'ژوئن', 'ژوئیه', 'اوت', 'سپتامبر', 'اکتبر', 'نوامبر', 'دسامبر'];
        const day = now.getDate();
        const month = months[now.getMonth()];
        const year = now.getFullYear();
        document.getElementById('gregDate').innerText = `${weekday} ${day} ${month} ${year}`;
    }

    function buildDaySelector() {
        const days = ['شنبه', 'یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنج‌شنبه', 'جمعه'];
        const order = [6, 0, 1, 2, 3, 4, 5];
        const container = document.getElementById('daySelector');
        container.innerHTML = '';
        order.forEach((dayIdx, idx) => {
            const btn = document.createElement('button');
            btn.className = 'day-btn';
            if (currentDay === dayIdx) btn.classList.add('active');
            btn.innerText = days[idx];
            btn.dataset.day = dayIdx;
            btn.addEventListener('click', () => {
                currentDay = dayIdx;
                document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderTasks();
                updateStats();
            });
            container.appendChild(btn);
        });
        const todayIdx = new Date().getDay();
        const todayBtn = document.querySelector(`.day-btn[data-day="${todayIdx}"]`);
        if (todayBtn) todayBtn.classList.add('today');
    }

    function showNotif(msg) {
        const notif = document.getElementById('notification');
        notif.querySelector('span').innerText = msg;
        notif.classList.add('show');
        setTimeout(() => notif.classList.remove('show'), 2000);
    }

    function resetToday() {
        if (confirm('بازنشانی تمام کارهای امروز؟')) {
            const key = getDayKey(currentDay);
            completedMap[key] = [];
            localStorage.setItem('smartProgress', JSON.stringify(completedMap));
            renderTasks();
            updateStats();
            showNotif('امروز بازنشانی شد');
        }
    }

    function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        const newTheme = current === 'light' ? 'dark' : 'light';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        const icon = document.querySelector('#themeToggle i');
        icon.className = newTheme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
    }

    function loadTheme() {
        const saved = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', saved);
        const icon = document.querySelector('#themeToggle i');
        icon.className = saved === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
    }

    // PWA manifest and service worker
    function generateManifest() {
        const manifest = {
            name: "برنامه هفتگی",
            short_name: "برنامه",
            start_url: ".",
            display: "standalone",
            theme_color: "#6366f1",
            background_color: "#0a0c15",
            icons: [
                {
                    src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%236366f1'/%3E%3Ctext x='50' y='67' font-size='48' text-anchor='middle' fill='white' font-family='monospace'%3E📅%3C/text%3E%3C/svg%3E",
                    sizes: "any",
                    type: "image/svg+xml",
                    purpose: "any maskable"
                }
            ]
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(manifestBlob);
        document.querySelector('#manifest-placeholder').setAttribute('href', manifestURL);
    }

    function installServiceWorker() {
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'weekly-planner-v3';
                const urlsToCache = [
                    './',
                    '${window.location.pathname}',
                    'https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&family=Amiri:wght@400;700&display=swap',
                    'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css'
                ];
                self.addEventListener('install', event => {
                    event.waitUntil(
                        caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache))
                    );
                });
                self.addEventListener('fetch', event => {
                    event.respondWith(
                        caches.match(event.request).then(response => response || fetch(event.request))
                    );
                });
                self.addEventListener('activate', event => {
                    event.waitUntil(
                        caches.keys().then(keys => Promise.all(
                            keys.filter(key => key !== CACHE_NAME).map(key => caches.delete(key))
                        ))
                    );
                });
            `;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            const url = URL.createObjectURL(blob);
            navigator.serviceWorker.register(url).catch(console.log);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateDateHeader();
        buildDaySelector();
        renderTasks();
        updateStats();
        loadTheme();
        document.getElementById('resetTodayBtn').addEventListener('click', resetToday);
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderTasks();
            });
        });
        generateManifest();
        installServiceWorker();
    });
</script>
